services:
  postgres:
    image: postgres:16
    container_name: freelance-postgres
    environment:
      POSTGRES_DB: freelance_automation
      POSTGRES_USER: fa_user
      POSTGRES_PASSWORD: fa_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: freelance-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

volumes:
  pgdata:
  n8n_data: