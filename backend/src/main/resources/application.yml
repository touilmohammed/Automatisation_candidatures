server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/freelance_automation
    username: fa_user
    password: fa_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: "change-this-secret-key-change-this-secret-key"
    expiration-minutes: 60

  storage:
    cv-directory: uploads/cv

  mistral:
    api-key: ${MISTRAL_API_KEY}
    model: mistral-medium-latest
    base-url: https://api.mistral.ai