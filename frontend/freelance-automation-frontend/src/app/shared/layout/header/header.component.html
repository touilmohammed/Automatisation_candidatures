<mat-toolbar color="primary">
  <span class="brand">
    <a routerLink="/jobs">Freelance Automation Platform</a>
  </span>

  <span class="spacer"></span>

  <nav *ngIf="authService.isLoggedIn()">
    <button mat-button routerLink="/jobs" routerLinkActive="active-link">Jobs</button>
    <button mat-button routerLink="/profile" routerLinkActive="active-link">Profil</button>
    <button mat-button routerLink="/cv" routerLinkActive="active-link">CV</button>
    <button mat-button routerLink="/notifications" routerLinkActive="active-link">Notifications</button>
    <button mat-button routerLink="/audit" routerLinkActive="active-link">Audit</button>
    <button mat-button (click)="logout()">Logout</button>
  </nav>

  <nav *ngIf="!authService.isLoggedIn()">
    <button mat-button routerLink="/login" routerLinkActive="active-link">Login</button>
    <button mat-button routerLink="/register" routerLinkActive="active-link">Register</button>
  </nav>
</mat-toolbar>
